<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analog Circuit Simulator</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="top-bar">
        <h1>Analog Circuit Simulator</h1>
        <button id="mode-btn" onclick="toggleMode()">Switch to Design Mode</button>
    </div>

    <div id="layout">

        <div id="left-panel">

            <div class="panel-section">
                <div class="panel-title" onclick="toggleSection('circuit-select', this)">
                    <span>Circuit</span>
                    <span class="arrow">▶</span>
                </div>
                <div class="radio-group" id="circuit-select" style="display:none;">
                    <label class="radio-opt active"><input type="radio" name="circuit" value="inverting" checked> Inverting amp</label>
                    <label class="radio-opt"><input type="radio" name="circuit" value="noninverting"> Non-inverting</label>
                    <label class="radio-opt"><input type="radio" name="circuit" value="voltageFollower"> Voltage follower</label>
                    <label class="radio-opt"><input type="radio" name="circuit" value="summingAmp"> Summing amp</label>
                    <label class="radio-opt"><input type="radio" name="circuit" value="integrator"> Integrator</label>
                    <label class="radio-opt"><input type="radio" name="circuit" value="differentiator"> Differentiator</label>
                </div>
            </div>

            <div class="panel-section">
                <div class="panel-title" onclick="toggleSection('waveform-select', this)">
                    <span>Waveform</span>
                    <span class="arrow">▶</span>
                </div>
                <div class="radio-group" id="waveform-select" style="display:none;">
                    <label class="radio-opt active"><input type="radio" name="waveform" value="sine" checked> Sine</label>
                    <label class="radio-opt"><input type="radio" name="waveform" value="square"> Square</label>
                    <label class="radio-opt"><input type="radio" name="waveform" value="triangle"> Triangle</label>
                </div>
            </div>

            <div class="panel-section">
                <div class="panel-title" onclick="toggleSection('opamp-select', this)">
                    <span>Op-amp model</span>
                    <span class="arrow">▶</span>
                </div>
                <div class="radio-group" id="opamp-select" style="display:none;">
                    <label class="radio-opt active"><input type="radio" name="opamp" value="ideal" checked> Ideal</label>
                    <label class="radio-opt"><input type="radio" name="opamp" value="lm741"> LM741</label>
                    <label class="radio-opt"><input type="radio" name="opamp" value="lm358"> LM358</label>
                    <label class="radio-opt"><input type="radio" name="opamp" value="tl071"> TL071</label>
                    <label class="radio-opt"><input type="radio" name="opamp" value="opa2134"> OPA2134</label>
                    <label class="radio-opt"><input type="radio" name="opamp" value="opa277"> OPA277</label>
                    <label class="radio-opt"><input type="radio" name="opamp" value="lmv321"> LMV321</label>
                </div>
            </div>

        </div>

        <div id="divider"></div>

        <div id="right-panel">

            <div id="workspace-area">
                <div id="workspace">

                    <div id="input-area">

                        <div id="inputs-inverting" class="input-section">
                            <div class="input-grid">
                                <div class="input-group">
                                    <label>Rin (kΩ)</label>
                                    <input type="number" id="rin" placeholder="Enter Rin">
                                </div>
                                <div class="input-group">
                                    <label>Rf (kΩ)</label>
                                    <input type="number" id="rf" placeholder="Enter Rf">
                                </div>
                                <div class="input-group">
                                    <label>Vin (V)</label>
                                    <input type="number" id="vin" placeholder="Enter Vin">
                                </div>
                                <div class="input-group">
                                    <label>Supply voltage (V)</label>
                                    <input type="number" id="vs" placeholder="Enter Vs">
                                </div>
                            </div>
                        </div>

                        <div id="inputs-noninverting" class="input-section" style="display:none;">
                            <div class="input-grid">
                                <div class="input-group">
                                    <label>Rin (kΩ)</label>
                                    <input type="number" id="rin-ni" placeholder="Enter Rin">
                                </div>
                                <div class="input-group">
                                    <label>Rf (kΩ)</label>
                                    <input type="number" id="rf-ni" placeholder="Enter Rf">
                                </div>
                                <div class="input-group">
                                    <label>Vin (V)</label>
                                    <input type="number" id="vin-ni" placeholder="Enter Vin">
                                </div>
                                <div class="input-group">
                                    <label>Supply voltage (V)</label>
                                    <input type="number" id="vs-ni" placeholder="Enter Vs">
                                </div>
                            </div>
                        </div>

                        <div id="inputs-voltageFollower" class="input-section" style="display:none;">
                            <div class="input-grid">
                                <div class="input-group">
                                    <label>Vin (V)</label>
                                    <input type="number" id="vin-vf" placeholder="Enter Vin">
                                </div>
                                <div class="input-group">
                                    <label>Supply voltage (V)</label>
                                    <input type="number" id="vs-vf" placeholder="Enter Vs">
                                </div>
                            </div>
                        </div>

                        <div id="inputs-summingAmp" class="input-section" style="display:none;">
                            <div class="input-group">
                                <label>Number of inputs</label>
                                <select id="sum-input-count">
                                    <option value="2">2 inputs</option>
                                    <option value="3">3 inputs</option>
                                    <option value="4">4 inputs</option>
                                </select>
                            </div>
                            <div id="summing-inputs" class="input-grid"></div>
                            <div class="input-grid">
                                <div class="input-group">
                                    <label>Rf (kΩ)</label>
                                    <input type="number" id="rf-sum" placeholder="Enter Rf">
                                </div>
                                <div class="input-group">
                                    <label>Supply voltage (V)</label>
                                    <input type="number" id="vs-sum" placeholder="Enter Vs">
                                </div>
                            </div>
                        </div>

                        <div id="inputs-integrator" class="input-section" style="display:none;">
                            <div class="input-grid">
                                <div class="input-group">
                                    <label>Rin (kΩ)</label>
                                    <input type="number" id="rin-int" placeholder="Enter Rin">
                                </div>
                                <div class="input-group">
                                    <label>Capacitor C (μF)</label>
                                    <input type="number" id="c-int" placeholder="Enter C">
                                </div>
                                <div class="input-group">
                                    <label>Vin (V)</label>
                                    <input type="number" id="vin-int" placeholder="Enter Vin">
                                </div>
                                <div class="input-group">
                                    <label>Supply voltage (V)</label>
                                    <input type="number" id="vs-int" placeholder="Enter Vs">
                                </div>
                            </div>
                        </div>

                        <div id="inputs-differentiator" class="input-section" style="display:none;">
                            <div class="input-grid">
                                <div class="input-group">
                                    <label>Rf (kΩ)</label>
                                    <input type="number" id="rf-diff" placeholder="Enter Rf">
                                </div>
                                <div class="input-group">
                                    <label>Capacitor C (μF)</label>
                                    <input type="number" id="c-diff" placeholder="Enter C">
                                </div>
                                <div class="input-group">
                                    <label>Vin (V)</label>
                                    <input type="number" id="vin-diff" placeholder="Enter Vin">
                                </div>
                                <div class="input-group">
                                    <label>Supply voltage (V)</label>
                                    <input type="number" id="vs-diff" placeholder="Enter Vs">
                                </div>
                            </div>
                        </div>

                    </div>

                    <div id="freq-input" style="display:none;">
                        <div class="input-group">
                            <label>Input frequency (Hz)</label>
                            <input type="number" id="freq" placeholder="Enter frequency (e.g. 1000)">
                        </div>
                    </div>

                    <div id="action-bar">
                        <button id="calc-btn">Calculate</button>
                        <button id="reset-btn">Clear</button>
                    </div>

                    <p id="warning"></p>

                    <div id="results">
                        <div id="ideal-results">
                            <p id="vout"></p>
                            <p id="gain"></p>
                        </div>
                        <div id="real-results" style="display:none;">
                            <p id="real-vout"></p>
                            <p id="vos-error"></p>
                            <p id="ib-error"></p>
                            <p id="gbw-error"></p>
                            <p id="slew-status"></p>
                            <p id="chip-desc"></p>
                        </div>
                    </div>

                    <div id="design-mode" style="display:none;">
                        <h2>Design Mode</h2>
                        <p>Enter your target gain and a starting Rin to find the required Rf.</p>
                        <div class="input-grid">
                            <div class="input-group">
                                <label>Target gain (e.g. -10)</label>
                                <input type="number" id="target-gain" placeholder="Enter target gain">
                            </div>
                            <div class="input-group">
                                <label>Rin (kΩ)</label>
                                <input type="number" id="design-rin" placeholder="Enter Rin">
                            </div>
                        </div>
                        <button id="design-btn">Find Components</button>
                        <div id="design-results" style="display:none;">
                            <p id="exact-rf"></p>
                            <p id="standard-rf"></p>
                            <p id="actual-gain"></p>
                            <p id="gain-error"></p>
                        </div>
                    </div>

                </div>
            </div>

            <div id="inner-divider" style="display:none;"></div>

            <div id="waveform-panel" style="display:none;">
                <div id="waveform-header">
                    <span>Waveform</span>
                    <div id="waveform-legend">
                        <span class="legend-item" style="color:#378ADD;">── Input</span>
                        <span class="legend-item" style="color:#1D9E75;">── Ideal output</span>
                        <span class="legend-item" style="color:#D85A30;">── Real output</span>
                    </div>
                </div>
                <canvas id="waveform-canvas"></canvas>
            </div>

        </div>

    </div>

    <script src="js/circuits/inverting.js"></script>
    <script src="js/circuits/noninverting.js"></script>
    <script src="js/circuits/voltageFollower.js"></script>
    <script src="js/circuits/summingAmp.js"></script>
    <script src="js/circuits/integrator.js"></script>
    <script src="js/circuits/differentiator.js"></script>
    <script src="js/nonidealities.js"></script>
    <script src="js/designMode.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
